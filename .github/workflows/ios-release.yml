name: ios release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v6.0.0). Must be a tag that exists or will be created.'
        required: true
        type: string
      prerelease:
        description: 'Mark release as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/ios-build-scripts.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download xcframework artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ffmpeg-kit-ios-xcframework-*
          path: artifacts

      - name: package artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in artifacts/ffmpeg-kit-ios-xcframework-*; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../../release-assets/${name}.zip" .)
          done
          ls -lah release-assets

      - name: resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          draft: false
          generate_release_notes: true
          files: release-assets/*.zip
          fail_on_unmatched_files: true
