name: ios build scripts

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/ios-build-scripts.yml'
      - 'apple/**'
      - '!apple/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'apple.sh'
      - 'ios.sh'
  pull_request:
    branches:
      - development
      - main
    paths:
      - '.github/workflows/ios-build-scripts.yml'
      - 'apple/**'
      - '!apple/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'apple.sh'
      - 'ios.sh'

jobs:
  build-main:
    name: ios main ${{ matrix.config.runner }} xcode ${{ matrix.config.xcode }}
    runs-on: ${{ matrix.config.runner }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { runner: macos-15, xcode: '16.2' }
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - name: prerequisites
        run: brew install autoconf automake libtool pkg-config curl git doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget gettext meson ninja ragel groff gtk-doc libtasn1 --overwrite
      - name: set up xcode
        run: echo "export DEVELOPER_DIR=/Applications/Xcode_${{ matrix.config.xcode }}.app/Contents/Developer" > ~/.xcode.for.ffmpeg.kit.sh
      - name: run the build script
        run: |
          export PATH="$(brew --prefix bison)/bin:$PATH"
          export XML_CATALOG_FILES="$(brew --prefix)/etc/xml/catalog"
          export CMAKE_POLICY_VERSION_MINIMUM=3.5
          ./ios.sh --xcframework \
            --disable-arm64e --disable-x86-64 \
            --disable-x86-64-mac-catalyst --disable-arm64-mac-catalyst \
            --enable-ios-audiotoolbox --enable-ios-avfoundation --enable-ios-bzip2 \
            --enable-ios-libiconv --enable-ios-videotoolbox --enable-ios-zlib \
            --enable-gpl \
            --enable-x264 --enable-x265 --enable-xvidcore --enable-libvidstab \
            --enable-libvpx --enable-openh264 --enable-fdk-aac \
            --enable-dav1d --enable-libaom --enable-kvazaar \
            --enable-libilbc --enable-libtheora --enable-libvorbis \
            --enable-libwebp --enable-lame --enable-opus --enable-shine \
            --enable-soxr --enable-speex --enable-twolame --enable-snappy \
            --enable-srt --enable-openssl --enable-chromaprint \
            --enable-fontconfig --enable-freetype --enable-fribidi \
            --enable-libass --enable-libxml2 --enable-zimg --enable-rubberband \
            --enable-tesseract --enable-opencore-amr
      - name: print build logs
        if: ${{ always() }}
        run: cat build.log
      - name: print ffbuild logs
        if: ${{ failure() }}
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'
      - name: upload xcframework artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-ios-xcframework-xcode-${{ matrix.config.xcode }}
          path: prebuilt/bundle-apple-xcframework-ios/
          if-no-files-found: error
          retention-days: 30
      - name: upload build log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-log-xcode-${{ matrix.config.xcode }}
          path: build.log
          if-no-files-found: ignore
          retention-days: 14
